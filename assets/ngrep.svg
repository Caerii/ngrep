10.871%{transform:translateY(-1360px)}
97.252%{transform:translateY(-1530px)}
97.265%{transform:translateY(-1700px)}
100.000%{transform:translateY(-1700px)}
            }

            #screen_view {
                animation-duration: 36566ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
