            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
0.005%{transform:translateY(-170px)}
1.846%{transform:translateY(-340px)}
1.851%{transform:translateY(-510px)}
2.748%{transform:translateY(-680px)}
2.757%{transform:translateY(-850px)}
